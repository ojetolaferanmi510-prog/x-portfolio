<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Messages · Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body class="admin">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="dashboard.html">oj<span>.</span>admin</a>
        <nav class="admin-nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="projects.html">Projects</a>
          <a href="messages.html" class="active">Messages</a>
        </nav>
        <button type="button" class="btn btn-ghost btn-sm logout-btn" id="logout">Log out</button>
      </aside>

      <div class="admin-main">
        <div class="container">
          <div class="admin-top">
            <div>
              <h1>Hire requests</h1>
              <p>Triage status, add notes, archive, or delete.</p>
            </div>
            <div class="filters" id="status-filters">
              <button type="button" class="filter-btn active" data-status="">Active</button>
              <button type="button" class="filter-btn" data-status="new">New</button>
              <button type="button" class="filter-btn" data-status="in_review">In review</button>
              <button type="button" class="filter-btn" data-status="accepted">Accepted</button>
              <button type="button" class="filter-btn" data-status="declined">Declined</button>
              <button type="button" class="filter-btn" data-archived="true">Archived</button>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head"><h2>Inbox</h2></div>
            <div class="table-wrap">
              <table class="data">
                <thead>
                  <tr>
                    <th>From</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>When</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="rows">
                  <tr><td colspan="5" class="text-muted">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
      <div class="modal">
        <header>
          <h2 id="modal-title">Message</h2>
          <button type="button" class="close-btn" id="modal-close" aria-label="Close">✕</button>
        </header>
        <div id="detail" class="msg-detail"></div>
        <div class="field mt-2">
          <label for="m-status">Status</label>
          <select id="m-status">
            <option value="new">new</option>
            <option value="in_review">in_review</option>
            <option value="accepted">accepted</option>
            <option value="declined">declined</option>
          </select>
        </div>
        <div class="field mt-2">
          <label for="m-note">Admin note</label>
          <textarea id="m-note" maxlength="2000"></textarea>
        </div>
        <div class="mt-2" style="display: flex; flex-wrap: wrap; gap: 0.5rem">
          <button type="button" class="btn btn-primary btn-sm" id="btn-save">Save changes</button>
          <button type="button" class="btn btn-ghost btn-sm" id="btn-archive">Archive</button>
          <button type="button" class="btn btn-danger btn-sm" id="btn-delete">Delete</button>
        </div>
        <div id="form-status" class="form-status" role="status"></div>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
    <script>
      const token = adminAuth.requireAuth();
      document.getElementById('logout').addEventListener('click', () => adminAuth.logout());

      const rows = document.getElementById('rows');
      const modal = document.getElementById('modal');
      const detail = document.getElementById('detail');
      const statusEl = document.getElementById('form-status');
      let current = null;
      let filter = { archived: false };

      document.getElementById('status-filters').addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('#status-filters .filter-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.archived === 'true') {
          filter = { archived: true };
        } else if (btn.dataset.status) {
          filter = { status: btn.dataset.status, archived: false };
        } else {
          filter = { archived: false };
        }
        loadMessages();
      });

      function openMessage(m) {
        current = m;
        statusEl.className = 'form-status';
        document.getElementById('modal-title').textContent = m.name;
        document.getElementById('m-status').value = m.status || 'new';
        document.getElementById('m-note').value = m.adminNote || '';
        detail.innerHTML = `
          <div><div class="label">Email</div><div><a href="mailto:${ui.escapeHtml(m.email)}">${ui.escapeHtml(m.email)}</a></div></div>
          <div><div class="label">Project type</div><div class="block">${ui.escapeHtml(m.projectType)}</div></div>
          <div><div class="label">Budget</div><div class="block">${ui.escapeHtml(m.budget || '—')}</div></div>
          <div><div class="label">Received</div><div class="block mono">${adminAuth.fmtDate(m.createdAt)}</div></div>
          <div><div class="label">Message</div><div class="block">${ui.escapeHtml(m.message)}</div></div>
        `;
        document.getElementById('btn-archive').textContent = m.archived ? 'Unarchive' : 'Archive';
        modal.classList.add('open');
      }

      function closeModal() {
        modal.classList.remove('open');
        current = null;
      }

      document.getElementById('modal-close').addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      document.getElementById('btn-save').addEventListener('click', async () => {
        if (!current) return;
        try {
          const { message } = await api.patchMessage(
            current._id,
            {
              status: document.getElementById('m-status').value,
              adminNote: document.getElementById('m-note').value,
            },
            token
          );
          current = message;
          ui.showStatus(statusEl, 'ok', 'Saved.');
          await loadMessages();
        } catch (err) {
          if (err.status === 401) return adminAuth.logout();
          ui.showStatus(statusEl, 'err', err.message || 'Save failed');
        }
      });

      document.getElementById('btn-archive').addEventListener('click', async () => {
        if (!current) return;
        try {
          await api.patchMessage(current._id, { archived: !current.archived }, token);
          closeModal();
          await loadMessages();
        } catch (err) {
          if (err.status === 401) return adminAuth.logout();
          ui.showStatus(statusEl, 'err', err.message || 'Failed');
        }
      });

      document.getElementById('btn-delete').addEventListener('click', async () => {
        if (!current || !confirm('Permanently delete this message?')) return;
        try {
          await api.deleteMessage(current._id, token);
          closeModal();
          await loadMessages();
        } catch (err) {
          if (err.status === 401) return adminAuth.logout();
          ui.showStatus(statusEl, 'err', err.message || 'Delete failed');
        }
      });

      async function loadMessages() {
        try {
          const { messages } = await api.getMessages(filter, token);
          if (!messages.length) {
            rows.innerHTML = '<tr><td colspan="5" class="text-muted">No messages.</td></tr>';
            return;
          }
          rows.innerHTML = messages
            .map(
              (m) => `<tr>
              <td>
                <strong>${ui.escapeHtml(m.name)}</strong><br />
                <span class="text-dim" style="font-size:0.8rem">${ui.escapeHtml(m.email)}</span>
              </td>
              <td class="text-muted">${ui.escapeHtml(m.projectType)}</td>
              <td>${adminAuth.statusBadge(m.status)}</td>
              <td class="text-dim mono" style="font-size:0.8rem">${adminAuth.fmtDate(m.createdAt)}</td>
              <td><button type="button" class="btn btn-ghost btn-sm" data-id="${m._id}">Open</button></td>
            </tr>`
            )
            .join('');

          rows.querySelectorAll('[data-id]').forEach((btn) => {
            btn.addEventListener('click', () => {
              const m = messages.find((x) => x._id === btn.dataset.id);
              if (m) openMessage(m);
            });
          });
        } catch (err) {
          if (err.status === 401) return adminAuth.logout();
          rows.innerHTML = `<tr><td colspan="5" class="error-state">${ui.escapeHtml(err.message)}</td></tr>`;
        }
      }

      loadMessages();
    </script>
  </body>
</html>
